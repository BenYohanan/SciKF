name: news_feeds
description: "Display science news (discoveries, findings) specific to Nigeria, allow users to ask questions via prompts, and view responses and details"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.4
  dropdown_search: ^6.0.2
  intl: ^0.20.2
  another_flushbar: ^1.12.32
  crypto: ^3.0.7
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  animations: ^2.1.1
  form_field_validator: ^1.1.0
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  file_picker: ^10.3.10
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  flutter_riverpod: ^3.3.1
  image_picker: ^1.2.1
  dio: ^5.9.2
  open_filex: ^4.7.0
  syncfusion_flutter_pdfviewer: ^33.1.44


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: OpenSans-Bold
      fonts:
        - asset: assets/fonts/OpenSans-Bold.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Bold.ttf
          style: italic
        - asset: assets/fonts/Roboto-Bold.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Bold.ttf
          style: italic

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/img/icon.jpg"